---
layout: default
permaling: /blog.html
title: Articles
---

<ul style="list-style-type:none; margin-left: 0;">
  {% for post in site.posts %}
    <li>
      <div class="post-block">
        <div class="post-block-left">
        </div>
        <div class="post-block-right">
          <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
          <div class="post-meta">
            {{ post.date | date_to_string }} | {{ post.category | capitalize }}
          </div>
        </div>
        <div class="post-block-main"
          {{ post.excerpt }}
        </div>
      </div>
    </li>
  {% endfor %}
</ul>
